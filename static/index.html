<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-XXXXXXXXXX');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AllQRMap - Restaurant Menus</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="search-container">
        <div class="search-bar">
            <input type="text" id="search-input" placeholder="Search or ask AI...">
            <div id="radius-widget">
                <span id="radius-label">📍 5 km</span>
                <input type="range" id="radius-slider" min="1" max="50" value="5">
            </div>
            <button id="ai-btn" title="AI Search">✨</button>
            <button id="add-btn" title="Add Restaurant">+</button>
        </div>
        <div id="search-suggestions" class="suggestions-list">
            <p class="suggestions-title">Try asking AI:</p>
            <div class="suggestion-item">🌊 Sahil kenarında bir yerler</div>
            <div class="suggestion-item">🥩 En iyi steakhouse mekanları</div>
            <div class="suggestion-item">🥐 Kahvaltı yapacak sakin bir kafe</div>
            <div class="suggestion-item">🥙 Beşiktaş'ta hızlı dönerciler</div>
            <div class="suggestion-item">🍲 Ev yemeği yapan yerler</div>
        </div>
    </div>

    <div id="add-modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Add New Restaurant</h2>
            <form id="add-form">
                <input type="text" id="res-name" placeholder="Restaurant Name" required>
                <input type="url" id="res-menu" placeholder="Menu URL (e.g. https://...)" required>
                <p class="hint">Click on the mini-map below to set the location:</p>
                <div id="mini-map"></div>
                <input type="hidden" id="res-lat">
                <input type="hidden" id="res-lng">
                <button type="submit" id="save-btn">Save Restaurant</button>
            </form>
        </div>
    </div>

    <div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
